# Nginx no host (fora do Docker).
# Instalar: sudo cp deploy/nginx/pokefit.conf /etc/nginx/sites-available/pokefit
#           sudo ln -sf /etc/nginx/sites-available/pokefit /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# TLS: sudo certbot --nginx -d pokefit.kizzcross.com.br

upstream pokefit_app {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    listen [::]:80;
    server_name pokefit.kizzcross.com.br;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/pokefit/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Mídia persistente (fotos de treino etc.)
    location /media/ {
        alias /var/www/pokefit/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://pokefit_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
