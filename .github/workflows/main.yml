name: main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///
      REDIS_URL: redis://127.0.0.1:6379/0
      SENDGRID_USERNAME: test
      SENDGRID_PASSWORD: test
      ALLOWED_HOSTS: localhost,pokefit.kizzcross.com.br
      # GitHub output breaks Django keys with special chars; use a fixed CI-only value.
      SECRET_KEY: pokefit-github-actions-ci-only-not-for-production-use-0123456789abcdef
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Poetry
        run: pip install poetry==2.0.1

      - name: Backend dependencies
        run: poetry install --with dev --no-root --no-interaction --no-ansi

      - name: Frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Check migrations
        working-directory: backend
        run: poetry run python manage.py makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: pokefit.settings.test

      - name: Django deploy checks
        working-directory: backend
        run: poetry run python manage.py check --deploy --fail-level ERROR
        env:
          DJANGO_SETTINGS_MODULE: pokefit.settings.production

      - name: Backend tests
        run: make test

      - name: Frontend tests
        run: pnpm run test

  deploy:
    name: Deploy to Hetzner
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error::Configure repository secret DEPLOY_HOST (ex: 178.105.169.230)"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "::error::Configure repository secret DEPLOY_USER (ex: root)"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error::Configure repository secret DEPLOY_SSH_KEY with the full PRIVATE key"
            exit 1
          fi
          if ! printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "::error::DEPLOY_SSH_KEY must be the private key (BEGIN ... PRIVATE KEY), not the .pub file"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/pokefit
            git fetch origin main
            git reset --hard origin/main
            cd deploy
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps
